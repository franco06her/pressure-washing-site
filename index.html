<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Texas Top Pressure Washing is coming soon.">
    <title>Coming Soon | Texas Top Pressure Washing</title>
    <style>
        :root {
            --ink: #1b1d20;
            --muted: #5d636a;
            --surface: #ffffff;
            --accent: #b3262d;
            --accent-deep: #8f1c22;
            --line: #e3e5e7;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            background: #f6f7f8;
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
        }

        main {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 2rem;
        }

        .coming-soon {
            width: min(100%, 42rem);
            border-top: 5px solid var(--accent);
            background: var(--surface);
            box-shadow: 0 18px 45px rgba(27, 29, 32, 0.1);
            padding: clamp(2.5rem, 7vw, 5rem) clamp(1.5rem, 7vw, 4.5rem);
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 1.5rem;
            color: var(--accent);
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.25rem, 8vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 0;
            line-height: 0.98;
        }

        p {
            margin: 1.5rem auto 0;
            max-width: 34rem;
            color: var(--muted);
            font-family: Arial, sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            line-height: 1.65;
        }

        .rule {
            width: 3rem;
            height: 1px;
            margin: 2rem auto;
            background: var(--line);
        }

        .contact {
            margin-top: 0;
            color: var(--ink);
            font-size: 0.95rem;
        }

        .contact a {
            color: var(--accent-deep);
            font-weight: 700;
            text-decoration-color: rgba(179, 38, 45, 0.35);
            text-underline-offset: 0.2em;
        }

        .contact a:hover,
        .contact a:focus-visible {
            color: var(--accent);
        }

        @media (max-width: 420px) {
            main {
                padding: 1rem;
            }

            .coming-soon {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="coming-soon" aria-labelledby="page-title">
            <p class="eyebrow">Austin, Texas</p>
            <h1 id="page-title">Texas Top<br>Pressure Washing</h1>
            <p>Our new website is on the way. Professional exterior cleaning services will be available here soon.</p>
            <div class="rule" aria-hidden="true"></div>
            <p class="contact">For service inquiries, call <a href="tel:5123670935">(512) 367-0935</a> or email <a href="mailto:info@texastoppressurewashing.com">info@texastoppressurewashing.com</a>.</p>
        </section>
    </main>
</body>
</html>
